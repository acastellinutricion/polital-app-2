<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="theme-color" content="#1F4E79" />
  <title>Polital</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.1/Recharts.min.js"></script>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; }
.nav { background: #1F4E79; padding: 0 1.25rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; }
.nav-title { color: #fff; font-size: 16px; font-weight: 600; }
.nav-sub { color: rgba(255,255,255,0.6); font-size: 12px; }
.logout-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
.logout-btn:hover { background: rgba(255,255,255,0.25); }
.page { max-width: 800px; margin: 0 auto; padding: 1.25rem; }
.card { background: #fff; border: 1px solid #e5e9f0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .04em; }
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
.metric-card { background: #fff; border: 1px solid #e5e9f0; border-radius: 10px; padding: 14px; text-align: center; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 600; }
.metric-badge { display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.badge-green { background: #C6EFCE; color: #1F7A4A; }
.badge-yellow { background: #FFEB9C; color: #9C6500; }
.badge-red { background: #FFC7CE; color: #9C0006; }
.tabs { display: flex; gap: 4px; border-bottom: 1px solid #e5e9f0; margin-bottom: 1.25rem; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #1F4E79; border-bottom-color: #1F4E79; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a2e; background: #fff; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #1F4E79; color: #fff; }
.btn-secondary { background: #f0f4f8; color: #444; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1F4E79 0%, #2E75B6 100%); padding: 1rem; }
.login-card { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.login-logo-circle { width: 56px; height: 56px; background: #1F4E79; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 10px; }
.login-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 1.5rem; }
.msg-error { background: #FFC7CE; color: #9C0006; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.msg-success { background: #C6EFCE; color: #1F7A4A; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.player-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border: 1px solid #e5e9f0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
.player-item:hover { border-color: #2E75B6; }
.player-avatar { width: 36px; height: 36px; border-radius: 50%; background: #D6E4F0; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #1F4E79; flex-shrink: 0; }
.alert-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border: 1px solid #e5e9f0; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
.stat-card { background: #fff; border: 1px solid #e5e9f0; border-radius: 10px; padding: 14px 16px; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.stat-value { font-size: 24px; font-weight: 600; color: #1F4E79; }
.stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.progress-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.progress-label { font-size: 12px; color: #555; width: 150px; flex-shrink: 0; }
.progress-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; }
.progress-val { font-size: 12px; font-weight: 600; width: 56px; text-align: right; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; }
.back-btn { background: none; border: none; color: #2E75B6; font-size: 13px; cursor: pointer; margin-bottom: 1rem; padding: 0; }
.section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; margin-top: 1.25rem; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #eee; background: #fafbfc; }
.data-table td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
.chart-wrap { width: 100%; height: 220px; margin-top: .5rem; }
.admin-link { text-align: center; font-size: 13px; color: #888; margin-top: 1rem; }
.admin-link span { color: #2E75B6; cursor: pointer; font-weight: 500; }
.login-divider { text-align: center; font-size: 12px; color: #aaa; margin: 12px 0; }
.priority-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
@media (max-width: 480px) { .metric-grid { grid-template-columns: 1fr 1fr; } .form-row { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer } = Recharts;

const SUPABASE_URL = 'https://vszcakubssswvofnuhze.supabase.co';
const SUPABASE_KEY = 'sb_publishable_86JNyOKyNltgsee-SCSVmg_kWb4yBHr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_USER = 'agus';
const ADMIN_PASS = 'polital2024';

// ── HELPERS ──────────────────────────────────────────────
function evalMA(v) {
  if (!v) return { label: '—', cls: '' };
  if (v <= 18) return { label: 'OK EN RANGO', cls: 'badge-green' };
  if (v <= 22) return { label: '!! REVISAR', cls: 'badge-yellow' };
  return { label: 'XX REDUCIR', cls: 'badge-red' };
}
function evalIMO(v) {
  if (!v) return { label: '—', cls: '' };
  if (v >= 3.8) return { label: 'OK ÓPTIMO', cls: 'badge-green' };
  if (v >= 3.5) return { label: '!! REVISAR', cls: 'badge-yellow' };
  return { label: 'XX MEJORAR', cls: 'badge-red' };
}
function evalS6P(v) {
  if (!v) return { label: '—', cls: '' };
  if (v <= 80) return { label: 'OK ÓPTIMO', cls: 'badge-green' };
  if (v <= 100) return { label: '!! REVISAR', cls: 'badge-yellow' };
  return { label: 'XX REDUCIR', cls: 'badge-red' };
}
function colorMA(v) { return v <= 18 ? '#1F7A4A' : v <= 22 ? '#9C6500' : '#9C0006'; }
function colorIMO(v) { return v >= 3.8 ? '#1F7A4A' : v >= 3.5 ? '#9C6500' : '#9C0006'; }
function colorS6P(v) { return v <= 80 ? '#1F7A4A' : v <= 100 ? '#9C6500' : '#9C0006'; }
function calcAlertas(m) {
  if (!m) return 0;
  let p = 0;
  if (m.masa_adiposa > 22) p += 2; else if (m.masa_adiposa > 18) p += 1;
  if (m.s6p > 100) p += 2; else if (m.s6p > 80) p += 1;
  if (m.imo < 3.5) p += 2; else if (m.imo < 3.8) p += 1;
  return p;
}
function prioLabel(p) {
  if (p >= 5) return { label: 'URGENTE', cls: 'badge-red' };
  if (p >= 3) return { label: 'ALTA', cls: 'badge-red' };
  if (p >= 2) return { label: 'MEDIA', cls: 'badge-yellow' };
  if (p >= 1) return { label: 'BAJA', cls: 'badge-yellow' };
  return { label: 'OK', cls: 'badge-green' };
}
function initials(nombre) { return nombre.split(' ').map(x => x[0]).slice(0,2).join(''); }

// ── LOGIN ─────────────────────────────────────────────────
function Login({ onLogin }) {
  const [mode, setMode] = useState('jugadora');
  const [usuario, setUsuario] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    if (mode === 'admin') {
      if (usuario === ADMIN_USER && password === ADMIN_PASS) {
        onLogin({ role: 'admin', nombre: 'Agus' });
      } else { setError('Usuario o contraseña incorrectos'); }
      setLoading(false); return;
    }
    const { data, error: err } = await sb.from('jugadoras')
      .select('*, planteles(nombre, deporte)')
      .eq('usuario', usuario.toLowerCase().trim())
      .eq('activa', true).single();
    if (err || !data) { setError('Usuario no encontrado'); setLoading(false); return; }
    if (data.password_hash !== password) { setError('Contraseña incorrecta'); setLoading(false); return; }
    onLogin({ role: 'jugadora', id: data.id, nombre: data.nombre, usuario: data.usuario,
      plantel_id: data.plantel_id, plantel_nombre: data.planteles?.nombre });
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
          <div className="login-logo-circle">P</div>
          <div className="login-title">Polital</div>
          <div className="login-sub">{mode === 'admin' ? 'Acceso administrador' : 'Sistema Antropométrico'}</div>
        </div>
        {error && <div className="msg-error">{error}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label>Usuario</label>
            <input type="text" value={usuario} onChange={e=>setUsuario(e.target.value)} placeholder="tu usuario" autoCapitalize="none" required />
          </div>
          <div className="form-group">
            <label>Contraseña</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required />
          </div>
          <button type="submit" className="btn btn-primary btn-full" disabled={loading}>{loading ? 'Ingresando...' : 'Ingresar'}</button>
        </form>
        <div className="login-divider">─────────────────</div>
        <div className="admin-link">
          {mode === 'jugadora'
            ? <><span style={{color:'#888'}}>¿Sos el entrenador? </span><span onClick={()=>{setMode('admin');setError('');}}>Acceso admin</span></>
            : <><span style={{color:'#888'}}>¿Sos jugadora? </span><span onClick={()=>{setMode('jugadora');setError('');}}>Volver</span></>
          }
        </div>
      </div>
    </div>
  );
}

// ── JUGADORA PANEL ────────────────────────────────────────
function JugadoraPanel({ session, onLogout }) {
  const [meds, setMeds] = useState([]);
  const [obj, setObj] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('estado');

  useEffect(() => {
    (async () => {
      const { data: m } = await sb.from('mediciones').select('*').eq('jugadora_id', session.id).order('n_medicion');
      const { data: o } = await sb.from('objetivos').select('*').eq('jugadora_id', session.id).single();
      setMeds(m || []); setObj(o); setLoading(false);
    })();
  }, []);

  const ultima = meds[meds.length - 1];
  const penultima = meds[meds.length - 2];
  const chartData = meds.map(m => ({ name: `N${m.n_medicion}`, MA: m.masa_adiposa, IMO: m.imo, S6P: m.s6p }));

  if (loading) return <div style={{textAlign:'center',paddingTop:'4rem',color:'#888'}}>Cargando...</div>;

  return (
    <div>
      <nav className="nav">
        <div className="nav-brand">
          <div className="nav-logo">P</div>
          <div><div className="nav-title">Polital</div><div className="nav-sub">{session.plantel_nombre}</div></div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Salir</button>
      </nav>
      <div className="page">
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:'1.25rem'}}>
          <div className="player-avatar" style={{width:48,height:48,fontSize:18}}>{initials(session.nombre)}</div>
          <div>
            <div style={{fontSize:20,fontWeight:600}}>{session.nombre}</div>
            {ultima && <div style={{fontSize:13,color:'#888'}}>Última medición: {ultima.fecha} · N° {ultima.n_medicion}</div>}
          </div>
        </div>
        <div className="tabs">
          {['estado','evolucion','historial'].map(t => (
            <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {t==='estado'?'Mi estado':t==='evolucion'?'Evolución':'Historial'}
            </button>
          ))}
        </div>

        {tab === 'estado' && ultima && <>
          <div className="metric-grid">
            {[
              {label:'Masa Adiposa',val:ultima.masa_adiposa,fmt:v=>v?.toFixed(2)+' kg',ev:evalMA,color:colorMA},
              {label:'IMO',val:ultima.imo,fmt:v=>v?.toFixed(2),ev:evalIMO,color:colorIMO},
              {label:'S6P',val:ultima.s6p,fmt:v=>v?.toFixed(0)+' mm',ev:evalS6P,color:colorS6P},
            ].map(({label,val,fmt,ev,color}) => {
              const e = ev(val);
              return (
                <div key={label} className="metric-card" style={{borderTop:`3px solid ${color(val)}`}}>
                  <div className="metric-label">{label}</div>
                  <div className="metric-value">{fmt(val)}</div>
                  <span className={`metric-badge ${e.cls}`}>{e.label}</span>
                </div>
              );
            })}
          </div>

          {penultima && (
            <div className="card">
              <div className="card-title">Vs medición anterior</div>
              {[
                {label:'Masa Adiposa',ant:penultima.masa_adiposa,nue:ultima.masa_adiposa,up:false,fmt:v=>v?.toFixed(2)+' kg'},
                {label:'IMO',ant:penultima.imo,nue:ultima.imo,up:true,fmt:v=>v?.toFixed(2)},
                {label:'S6P',ant:penultima.s6p,nue:ultima.s6p,up:false,fmt:v=>v?.toFixed(0)+' mm'},
              ].map(({label,ant,nue,up,fmt}) => {
                const diff = nue - ant;
                const better = up ? diff > 0 : diff < 0;
                const neutral = Math.abs(diff) < 0.05;
                return (
                  <div key={label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid #f0f0f0'}}>
                    <span style={{fontSize:13,color:'#555'}}>{label}</span>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <span style={{fontSize:12,color:'#aaa'}}>{fmt(ant)}</span>
                      <span>→</span>
                      <span style={{fontSize:13,fontWeight:600}}>{fmt(nue)}</span>
                      <span style={{fontSize:12,fontWeight:600,padding:'2px 8px',borderRadius:20,
                        color:neutral?'#888':better?'#1F7A4A':'#9C0006',
                        background:neutral?'#f0f0f0':better?'#C6EFCE':'#FFC7CE'}}>
                        {neutral?'=':diff>0?'▲':'▼'} {Math.abs(diff).toFixed(2)}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {obj && (
            <div className="card">
              <div className="card-title">Mis objetivos</div>
              {obj.notas && <div style={{marginBottom:12,padding:10,background:'#f5f7fa',borderRadius:8,fontSize:13,color:'#555'}}>📝 {obj.notas}</div>}
              {[
                {label:'MA objetivo',val:obj.ma_objetivo,actual:ultima.masa_adiposa,unit:'kg',better:v=>v<=obj.ma_objetivo},
                {label:'IMO objetivo',val:obj.imo_objetivo,actual:ultima.imo,unit:'',better:v=>v>=obj.imo_objetivo},
                {label:'S6P objetivo',val:obj.s6p_objetivo,actual:ultima.s6p,unit:'mm',better:v=>v<=obj.s6p_objetivo},
              ].filter(x=>x.val).map(({label,val,actual,unit,better}) => (
                <div key={label} className="progress-item">
                  <div className="progress-label">{label}: {val}{unit}</div>
                  <div className="progress-track">
                    <div className="progress-fill" style={{width:`${Math.min(100,actual/val*100).toFixed(0)}%`,background:better(actual)?'#1F7A4A':'#9C6500'}}/>
                  </div>
                  <div className="progress-val">{actual?.toFixed(1)}</div>
                </div>
              ))}
            </div>
          )}
        </>}

        {tab === 'evolucion' && (
          chartData.length >= 2
            ? <div className="card"><div className="card-title">Evolución de parámetros</div>
                <div className="chart-wrap">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={chartData}>
                      <XAxis dataKey="name" tick={{fontSize:11}}/>
                      <YAxis tick={{fontSize:11}}/>
                      <Tooltip/><Legend/>
                      <Line type="monotone" dataKey="MA" stroke="#C55A11" strokeWidth={2} dot={{r:4}} name="M.Adiposa"/>
                      <Line type="monotone" dataKey="IMO" stroke="#2E75B6" strokeWidth={2} dot={{r:4}} name="IMO"/>
                      <Line type="monotone" dataKey="S6P" stroke="#70AD47" strokeWidth={2} dot={{r:4}} name="S6P"/>
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            : <div className="card" style={{textAlign:'center',color:'#888',padding:'2rem'}}>Necesitás al menos 2 mediciones para ver la evolución.</div>
        )}

        {tab === 'historial' && (
          <div style={{background:'#fff',border:'1px solid #e5e9f0',borderRadius:12,overflow:'hidden'}}>
            <table className="data-table">
              <thead><tr><th>Fecha</th><th>N°</th><th>MA (kg)</th><th>IMO</th><th>S6P (mm)</th></tr></thead>
              <tbody>
                {[...meds].reverse().map(m => (
                  <tr key={m.id}>
                    <td>{m.fecha||'—'}</td>
                    <td style={{fontWeight:600}}>N{m.n_medicion}</td>
                    <td style={{color:colorMA(m.masa_adiposa),fontWeight:600}}>{m.masa_adiposa?.toFixed(2)}</td>
                    <td style={{color:colorIMO(m.imo),fontWeight:600}}>{m.imo?.toFixed(2)}</td>
                    <td style={{color:colorS6P(m.s6p),fontWeight:600}}>{m.s6p?.toFixed(0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────
function AdminPanel({ session, onLogout }) {
  const [tab, setTab] = useState('plantel');
  const [planteles, setPlanteles] = useState([]);
  const [jugadoras, setJugadoras] = useState([]);
  const [mediciones, setMediciones] = useState([]);
  const [selectedPlantel, setSelectedPlantel] = useState(null);
  const [selectedJugadora, setSelectedJugadora] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showAddJug, setShowAddJug] = useState(false);
  const [showAddMed, setShowAddMed] = useState(false);
  const [showObj, setShowObj] = useState(false);
  const [objetivoActual, setObjetivoActual] = useState(null);

  useEffect(() => { loadAll(); }, []);

  const loadAll = async () => {
    setLoading(true);
    const { data: pl } = await sb.from('planteles').select('*').order('id');
    const { data: ju } = await sb.from('jugadoras').select('*, planteles(nombre)').eq('activa', true).order('nombre');
    const { data: me } = await sb.from('mediciones').select('*').order('n_medicion');
    setPlanteles(pl||[]); setJugadoras(ju||[]); setMediciones(me||[]);
    if (pl?.length && !selectedPlantel) setSelectedPlantel(pl[0]);
    setLoading(false);
  };

  const getUltima = (jid) => { const m = mediciones.filter(x=>x.jugadora_id===jid); return m[m.length-1]||null; };
  const getMeds = (jid) => mediciones.filter(x=>x.jugadora_id===jid).sort((a,b)=>a.n_medicion-b.n_medicion);
  const jugsPlantel = jugadoras.filter(j=>j.plantel_id===selectedPlantel?.id);
  const ultimas = jugsPlantel.map(j=>getUltima(j.id)).filter(Boolean);
  const avgMA = ultimas.length ? (ultimas.reduce((s,m)=>s+m.masa_adiposa,0)/ultimas.length).toFixed(1) : '—';
  const avgIMO = ultimas.length ? (ultimas.reduce((s,m)=>s+m.imo,0)/ultimas.length).toFixed(2) : '—';
  const avgS6P = ultimas.length ? (ultimas.reduce((s,m)=>s+m.s6p,0)/ultimas.length).toFixed(0) : '—';
  const conAlertas = ultimas.filter(m=>calcAlertas(m)>=2).length;

  if (loading) return <div style={{textAlign:'center',paddingTop:'4rem',color:'#888'}}>Cargando...</div>;

  // Detalle jugadora
  if (selectedJugadora) {
    const meds = getMeds(selectedJugadora.id);
    const ultima = meds[meds.length-1];
    const chartData = meds.map(m=>({name:`N${m.n_medicion}`,MA:m.masa_adiposa,IMO:m.imo,S6P:m.s6p}));
    return (
      <div>
        <nav className="nav">
          <div className="nav-brand"><div className="nav-logo">P</div><div className="nav-title">Admin</div></div>
          <button className="logout-btn" onClick={onLogout}>Salir</button>
        </nav>
        <div className="page">
          <button className="back-btn" onClick={()=>setSelectedJugadora(null)}>← Volver</button>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:'1rem'}}>
            <div className="player-avatar" style={{width:48,height:48,fontSize:18}}>{initials(selectedJugadora.nombre)}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:20,fontWeight:600}}>{selectedJugadora.nombre}</div>
              <div style={{fontSize:13,color:'#888'}}>{selectedJugadora.planteles?.nombre} · @{selectedJugadora.usuario}</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>setShowAddMed(true)}>+ Medición</button>
              <button className="btn btn-secondary btn-sm" onClick={async()=>{
                const {data} = await sb.from('objetivos').select('*').eq('jugadora_id',selectedJugadora.id).single();
                setObjetivoActual(data); setShowObj(true);
              }}>Objetivos</button>
            </div>
          </div>
          {ultima && (
            <div className="metric-grid">
              {[
                {label:'Masa Adiposa',val:ultima.masa_adiposa,ev:evalMA,color:colorMA},
                {label:'IMO',val:ultima.imo,ev:evalIMO,color:colorIMO},
                {label:'S6P',val:ultima.s6p,ev:evalS6P,color:colorS6P},
              ].map(({label,val,ev,color}) => {
                const e = ev(val);
                return (
                  <div key={label} className="metric-card" style={{borderTop:`3px solid ${color(val)}`}}>
                    <div className="metric-label">{label}</div>
                    <div className="metric-value">{typeof val==='number'?val.toFixed(val<10?2:1):'—'}</div>
                    <span className={`metric-badge ${e.cls}`}>{e.label}</span>
                  </div>
                );
              })}
            </div>
          )}
          {chartData.length >= 2 && (
            <div className="card"><div className="card-title">Evolución</div>
              <div className="chart-wrap">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={chartData}>
                    <XAxis dataKey="name" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
                    <Tooltip/><Legend/>
                    <Line type="monotone" dataKey="MA" stroke="#C55A11" strokeWidth={2} dot={{r:4}} name="M.Adiposa"/>
                    <Line type="monotone" dataKey="IMO" stroke="#2E75B6" strokeWidth={2} dot={{r:4}} name="IMO"/>
                    <Line type="monotone" dataKey="S6P" stroke="#70AD47" strokeWidth={2} dot={{r:4}} name="S6P"/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>
          )}
          <div style={{background:'#fff',border:'1px solid #e5e9f0',borderRadius:12,overflow:'hidden'}}>
            <table className="data-table">
              <thead><tr><th>Fecha</th><th>N°</th><th>Peso</th><th>MA</th><th>MM</th><th>MO</th><th>S6P</th><th>IMO</th></tr></thead>
              <tbody>
                {[...meds].reverse().map(m=>(
                  <tr key={m.id}>
                    <td>{m.fecha||'—'}</td><td style={{fontWeight:600}}>N{m.n_medicion}</td><td>{m.peso}</td>
                    <td style={{color:colorMA(m.masa_adiposa),fontWeight:600}}>{m.masa_adiposa?.toFixed(2)}</td>
                    <td>{m.masa_muscular?.toFixed(2)}</td><td>{m.masa_osea?.toFixed(3)}</td>
                    <td style={{color:colorS6P(m.s6p),fontWeight:600}}>{m.s6p}</td>
                    <td style={{color:colorIMO(m.imo),fontWeight:600}}>{m.imo?.toFixed(2)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        {showAddMed && <ModalMedicion jugadora={selectedJugadora} nextN={meds.length+1}
          onClose={()=>setShowAddMed(false)} onSaved={()=>{setShowAddMed(false);loadAll();}}/>}
        {showObj && <ModalObjetivo jugadora={selectedJugadora} objetivo={objetivoActual}
          onClose={()=>setShowObj(false)} onSaved={()=>setShowObj(false)}/>}
      </div>
    );
  }

  return (
    <div>
      <nav className="nav">
        <div className="nav-brand"><div className="nav-logo">P</div>
          <div><div className="nav-title">Polital Admin</div><div className="nav-sub">Hola, {session.nombre}</div></div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Salir</button>
      </nav>
      <div className="page">
        <div style={{display:'flex',gap:8,marginBottom:'1.25rem',flexWrap:'wrap'}}>
          {planteles.map(p=>(
            <button key={p.id} className={`btn btn-sm ${selectedPlantel?.id===p.id?'btn-primary':'btn-secondary'}`}
              onClick={()=>setSelectedPlantel(p)}>{p.nombre}</button>
          ))}
        </div>
        <div className="tabs">
          {['plantel','alertas','resumen'].map(t=>(
            <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {t==='plantel'?'Plantel':t==='alertas'?'Alertas':'Resumen'}
            </button>
          ))}
        </div>

        {tab === 'plantel' && <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,color:'#888'}}>{jugsPlantel.length} jugadoras</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowAddJug(true)}>+ Jugadora</button>
          </div>
          {jugsPlantel.map(j=>{
            const u = getUltima(j.id); const pts = calcAlertas(u); const prio = prioLabel(pts);
            return (
              <div key={j.id} className="player-item" onClick={()=>setSelectedJugadora(j)}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div className="player-avatar">{initials(j.nombre)}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:500}}>{j.nombre}</div>
                    {u ? <div style={{fontSize:12,color:'#888'}}>MA: {u.masa_adiposa?.toFixed(1)} · IMO: {u.imo?.toFixed(2)} · S6P: {u.s6p}</div>
                       : <div style={{fontSize:12,color:'#aaa'}}>Sin mediciones</div>}
                  </div>
                </div>
                {u && <span className={`metric-badge ${prio.cls}`} style={{fontSize:11}}>{prio.label}</span>}
              </div>
            );
          })}
        </>}

        {tab === 'alertas' && <>
          <div style={{fontSize:13,color:'#888',marginBottom:12}}>{conAlertas} jugadoras requieren atención</div>
          {jugsPlantel.map(j=>({j,u:getUltima(j.id)})).filter(x=>x.u)
            .sort((a,b)=>calcAlertas(b.u)-calcAlertas(a.u))
            .map(({j,u})=>{
              const pts = calcAlertas(u); const prio = prioLabel(pts);
              const det = [];
              if(u.masa_adiposa>22) det.push(`MA alta (${u.masa_adiposa?.toFixed(1)} kg)`);
              else if(u.masa_adiposa>18) det.push(`MA revisar (${u.masa_adiposa?.toFixed(1)} kg)`);
              if(u.s6p>100) det.push(`S6P alta (${u.s6p} mm)`);
              else if(u.s6p>80) det.push(`S6P revisar (${u.s6p} mm)`);
              if(u.imo<3.5) det.push(`IMO bajo (${u.imo?.toFixed(2)})`);
              else if(u.imo<3.8) det.push(`IMO revisar (${u.imo?.toFixed(2)})`);
              return (
                <div key={j.id} className="alert-item" onClick={()=>setSelectedJugadora(j)}>
                  <div>
                    <div style={{fontSize:14,fontWeight:500}}>{j.nombre}</div>
                    <div style={{fontSize:12,color:'#888',marginTop:3}}>{det.length?det.join(' · '):'Sin alertas'}</div>
                  </div>
                  <span className={`priority-badge ${prio.cls}`}>{prio.label}</span>
                </div>
              );
            })}
        </>}

        {tab === 'resumen' && <>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">Jugadoras</div><div className="stat-value">{jugsPlantel.length}</div><div className="stat-sub">{selectedPlantel?.nombre}</div></div>
            <div className="stat-card"><div className="stat-label">Con alertas</div><div className="stat-value" style={{color:conAlertas>0?'#9C0006':'#1F7A4A'}}>{conAlertas}</div><div className="stat-sub">requieren atención</div></div>
            <div className="stat-card"><div className="stat-label">MA promedio</div><div className="stat-value">{avgMA}</div><div className="stat-sub">kg · obj ≤ 22</div></div>
            <div className="stat-card"><div className="stat-label">IMO promedio</div><div className="stat-value">{avgIMO}</div><div className="stat-sub">obj ≥ 3.8</div></div>
          </div>
          <div className="stat-card" style={{marginBottom:'1rem'}}><div className="stat-label">S6P promedio</div><div className="stat-value">{avgS6P} mm</div><div className="stat-sub">objetivo ≤ 80 mm</div></div>
          <div className="section-title">Estado del plantel</div>
          {[
            {label:'MA en rango (≤22 kg)',count:ultimas.filter(m=>m.masa_adiposa<=22).length,color:'#1F7A4A'},
            {label:'IMO óptimo (≥3.8)',count:ultimas.filter(m=>m.imo>=3.8).length,color:'#2E75B6'},
            {label:'S6P óptimo (≤80 mm)',count:ultimas.filter(m=>m.s6p<=80).length,color:'#70AD47'},
          ].map(({label,count,color})=>(
            <div key={label} className="progress-item">
              <div className="progress-label">{label}</div>
              <div className="progress-track"><div className="progress-fill" style={{width:`${ultimas.length?(count/ultimas.length*100).toFixed(0):0}%`,background:color}}/></div>
              <div className="progress-val" style={{color}}>{count}/{ultimas.length}</div>
            </div>
          ))}
        </>}
      </div>
      {showAddJug && <ModalJugadora planteles={planteles} defaultPlantel={selectedPlantel}
        onClose={()=>setShowAddJug(false)} onSaved={()=>{setShowAddJug(false);loadAll();}}/>}
    </div>
  );
}

// ── MODALES ───────────────────────────────────────────────
function ModalJugadora({ planteles, defaultPlantel, onClose, onSaved }) {
  const [form, setForm] = useState({nombre:'',plantel_id:defaultPlantel?.id||'',usuario:'',password_hash:''});
  const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const f = k => e => setForm({...form,[k]:e.target.value});
  const save = async () => {
    if(!form.nombre||!form.plantel_id||!form.usuario||!form.password_hash){setError('Completá todos los campos');return;}
    setLoading(true);
    const {error:err} = await sb.from('jugadoras').insert({nombre:form.nombre.trim(),plantel_id:parseInt(form.plantel_id),usuario:form.usuario.toLowerCase().trim(),password_hash:form.password_hash,activa:true});
    if(err){setError(err.message);setLoading(false);return;}
    onSaved();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Nueva jugadora</div>
        {error && <div className="msg-error">{error}</div>}
        <div className="form-group"><label>Nombre completo</label><input value={form.nombre} onChange={f('nombre')} placeholder="Ej: María García"/></div>
        <div className="form-group"><label>Plantel</label>
          <select value={form.plantel_id} onChange={f('plantel_id')}>
            <option value="">Seleccioná</option>
            {planteles.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
          </select>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Usuario</label><input value={form.usuario} onChange={f('usuario')} placeholder="maria.garcia"/></div>
          <div className="form-group"><label>Contraseña</label><input value={form.password_hash} onChange={f('password_hash')} placeholder="••••••••"/></div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Guardando...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function ModalMedicion({ jugadora, nextN, onClose, onSaved }) {
  const [form, setForm] = useState({fecha:'',n_medicion:nextN,peso:'',talla:'',masa_adiposa:'',masa_muscular:'',masa_osea:'',s6p:''});
  const [loading, setLoading] = useState(false); const [error, setError] = useState('');
  const f = k => e => setForm({...form,[k]:e.target.value});
  const save = async () => {
    if(!form.masa_adiposa||!form.masa_muscular||!form.masa_osea||!form.s6p){setError('Completá MA, MM, MO y S6P');return;}
    setLoading(true);
    const mo=parseFloat(form.masa_osea); const mm=parseFloat(form.masa_muscular);
    const imo=mo>0?Math.round(mm/mo*100)/100:0;
    const {error:err} = await sb.from('mediciones').insert({jugadora_id:jugadora.id,fecha:form.fecha||'—',n_medicion:parseInt(form.n_medicion),
      peso:parseFloat(form.peso)||null,talla:parseFloat(form.talla)||null,
      masa_adiposa:parseFloat(form.masa_adiposa),masa_muscular:mm,masa_osea:mo,s6p:parseFloat(form.s6p),imo});
    if(err){setError(err.message);setLoading(false);return;}
    onSaved();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Nueva medición — {jugadora.nombre}</div>
        {error && <div className="msg-error">{error}</div>}
        <div className="form-row">
          <div className="form-group"><label>Fecha</label><input value={form.fecha} onChange={f('fecha')} placeholder="DD/MM/AAAA"/></div>
          <div className="form-group"><label>N° medición</label><input type="number" value={form.n_medicion} onChange={f('n_medicion')}/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Peso (kg)</label><input type="number" step="0.01" value={form.peso} onChange={f('peso')} placeholder="0.00"/></div>
          <div className="form-group"><label>Talla (cm)</label><input type="number" step="0.1" value={form.talla} onChange={f('talla')} placeholder="0.0"/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Masa Adiposa (kg)</label><input type="number" step="0.001" value={form.masa_adiposa} onChange={f('masa_adiposa')} placeholder="0.000"/></div>
          <div className="form-group"><label>Masa Muscular (kg)</label><input type="number" step="0.001" value={form.masa_muscular} onChange={f('masa_muscular')} placeholder="0.000"/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Masa Ósea (kg)</label><input type="number" step="0.001" value={form.masa_osea} onChange={f('masa_osea')} placeholder="0.000"/></div>
          <div className="form-group"><label>S6P (mm)</label><input type="number" step="0.1" value={form.s6p} onChange={f('s6p')} placeholder="0.0"/></div>
        </div>
        <div style={{background:'#f5f7fa',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#555'}}>💡 IMO se calcula solo (MM ÷ MO)</div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Guardando...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function ModalObjetivo({ jugadora, objetivo, onClose, onSaved }) {
  const [form, setForm] = useState({ma_objetivo:objetivo?.ma_objetivo||'',imo_objetivo:objetivo?.imo_objetivo||'',s6p_objetivo:objetivo?.s6p_objetivo||'',notas:objetivo?.notas||''});
  const [loading, setLoading] = useState(false);
  const f = k => e => setForm({...form,[k]:e.target.value});
  const save = async () => {
    setLoading(true);
    const data = {jugadora_id:jugadora.id,ma_objetivo:parseFloat(form.ma_objetivo)||null,imo_objetivo:parseFloat(form.imo_objetivo)||null,s6p_objetivo:parseFloat(form.s6p_objetivo)||null,notas:form.notas||null,updated_at:new Date().toISOString()};
    if(objetivo) await sb.from('objetivos').update(data).eq('jugadora_id',jugadora.id);
    else await sb.from('objetivos').insert(data);
    setLoading(false); onSaved(); onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Objetivos — {jugadora.nombre}</div>
        <div className="form-row">
          <div className="form-group"><label>MA objetivo (kg)</label><input type="number" step="0.01" value={form.ma_objetivo} onChange={f('ma_objetivo')} placeholder="Ej: 18.00"/></div>
          <div className="form-group"><label>IMO objetivo</label><input type="number" step="0.01" value={form.imo_objetivo} onChange={f('imo_objetivo')} placeholder="Ej: 4.00"/></div>
        </div>
        <div className="form-group"><label>S6P objetivo (mm)</label><input type="number" step="0.1" value={form.s6p_objetivo} onChange={f('s6p_objetivo')} placeholder="Ej: 80"/></div>
        <div className="form-group"><label>Notas / indicaciones</label><textarea value={form.notas} onChange={f('notas')} rows={3} placeholder="Indicaciones personalizadas..." style={{resize:'vertical'}}/></div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={save} disabled={loading}>{loading?'Guardando...':'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  useEffect(() => {
    const s = localStorage.getItem('polital_session');
    if (s) setSession(JSON.parse(s));
  }, []);
  const handleLogin = s => { localStorage.setItem('polital_session', JSON.stringify(s)); setSession(s); };
  const handleLogout = () => { localStorage.removeItem('polital_session'); setSession(null); };
  if (!session) return <Login onLogin={handleLogin}/>;
  if (session.role === 'admin') return <AdminPanel session={session} onLogout={handleLogout}/>;
  return <JugadoraPanel session={session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
