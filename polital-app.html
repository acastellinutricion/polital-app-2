<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>

<title>Polital</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh}
.nav{background:#1F4E79;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.nav-title{color:#fff;font-size:16px;font-weight:600}
.nav-sub{color:rgba(255,255,255,.6);font-size:12px}
.logout-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.page{max-width:820px;margin:0 auto;padding:1.25rem}
.card{background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:#888;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.metric-card{background:#fff;border:1px solid #e5e9f0;border-radius:10px;padding:14px;text-align:center}
.metric-label{font-size:11px;color:#888;margin-bottom:6px}
.metric-value{font-size:22px;font-weight:600}
.metric-badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-green{background:#C6EFCE;color:#1F7A4A}
.badge-yellow{background:#FFEB9C;color:#9C6500}
.badge-red{background:#FFC7CE;color:#9C0006}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e9f0;margin-bottom:1.25rem;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:#1F4E79;border-bottom-color:#1F4E79}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a2e;background:#fff;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#1F4E79}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#1F4E79;color:#fff}
.btn-secondary{background:#f0f4f8;color:#444}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;margin-top:8px;display:block}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1F4E79 0%,#2E75B6 100%);padding:1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo-circle{width:56px;height:56px;background:#1F4E79;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700;margin-bottom:10px}
.login-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;text-align:center;margin-bottom:1.5rem}
.msg-error{background:#FFC7CE;color:#9C0006;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.msg-success{background:#C6EFCE;color:#1F7A4A;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.player-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border:1px solid #e5e9f0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.player-item:hover{border-color:#2E75B6}
.player-avatar{width:36px;height:36px;border-radius:50%;background:#D6E4F0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#1F4E79;flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#fff;border:1px solid #e5e9f0;border-radius:10px;padding:14px 16px}
.stat-label{font-size:12px;color:#888;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:600;color:#1F4E79}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}
.progress-item{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.progress-label{font-size:12px;color:#555;width:170px;flex-shrink:0}
.progress-track{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px}
.progress-val{font-size:12px;font-weight:600;width:56px;text-align:right}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
.back-btn{background:none;border:none;color:#2E75B6;font-size:13px;cursor:pointer;margin-bottom:1rem;padding:0}
.section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:1.25rem}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;border-bottom:1px solid #eee;background:#fafbfc}
.data-table td{padding:12px;border-bottom:1px solid #f0f0f0}
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border:1px solid #e5e9f0;border-radius:10px;margin-bottom:8px;cursor:pointer}
.priority-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.plantel-btns{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.diff-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.diff-row:last-child{border-bottom:none}
.big-diff{display:flex;align-items:center;gap:8px;padding:16px;border-radius:12px;margin-bottom:10px}
.big-diff-icon{font-size:28px}
.big-diff-content{flex:1}
.big-diff-label{font-size:12px;color:#666;margin-bottom:2px}
.big-diff-values{font-size:15px;font-weight:600}
.big-diff-change{font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px}
.motiv-card{background:linear-gradient(135deg,#1F7A4A 0%,#2E9B5F 100%);color:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.motiv-title{font-size:16px;font-weight:700;margin-bottom:4px}
.motiv-text{font-size:13px;opacity:.95}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}
.search-box:focus{border-color:#1F4E79}
.filter-btns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer}
.filter-btn.active{background:#1F4E79;color:#fff;border-color:#1F4E79}
.chart-box{position:relative;height:260px;width:100%}
.dropzone{border:2px dashed #c7d2e0;border-radius:10px;padding:16px;text-align:center;font-size:13px;color:#888;margin-bottom:14px;cursor:pointer;transition:border-color .15s,background .15s}
.dropzone:hover{border-color:#2E75B6;background:#f8fafc}
.dropzone.drag{border-color:#1F4E79;background:#eef4fa;color:#1F4E79}
.hidden{display:none!important}
@media(max-width:500px){.metric-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.progress-label{width:120px}}
@media print{.nav,.tabs,.btn,.back-btn,.logout-btn{display:none!important}body{background:#fff}.card{break-inside:avoid}}
</style>

<script>
const SB_URL='https://vszcakubssswvofnuhze.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzemNha3Vic3Nzd3ZvZm51aHplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjQzMjUsImV4cCI6MjA5ODYwMDMyNX0.B6va0Z7Xnc6d6iYHRG3SlvLtgCcfgqKxci1L49e0fGc';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

// ── SUPABASE CLIENT ───────────────────────────────────────
const sb={
  from(table){
    let _sel='*',_fil=[],_ord=null,_single=false;
    const c={
      select(s){_sel=s;return c;},
      eq(col,val){_fil.push(col+'=eq.'+encodeURIComponent(val));return c;},
      order(col,opts){_ord=col+(opts&&opts.ascending===false?'.desc':'.asc');return c;},
      single(){_single=true;return c;},
      async then(res){
        let url=SB_URL+'/rest/v1/'+table+'?select='+encodeURIComponent(_sel);
        _fil.forEach(f=>url+='&'+f);
        if(_ord)url+='&order='+_ord;
        const h=Object.assign({},H);
        if(_single)h['Accept']='application/vnd.pgrst.object+json';
        try{
          const r=await fetch(url,{headers:h});
          const txt=await r.text();
          const data=txt?JSON.parse(txt):null;
          res({data:r.ok?data:null,error:r.ok?null:{message:txt}});
        }catch(e){res({data:null,error:{message:e.message}});}
      }
    };
    return {
      select(s){if(s)_sel=s;return c;},
      eq(col,val){_fil.push(col+'=eq.'+encodeURIComponent(val));return c;},
      single(){_single=true;return c;},
      order(col,opts){_ord=col+(opts&&opts.ascending===false?'.desc':'.asc');return c;},
      async insert(data){
        try{
          const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:H,body:JSON.stringify(Array.isArray(data)?data:[data])});
          const txt=await r.text();
          return {data:txt?JSON.parse(txt):null,error:r.ok?null:{message:txt}};
        }catch(e){return {data:null,error:{message:e.message}};}
      },
      update(data){
        let _uf=[];
        const uc={
          eq(col,val){_uf.push(col+'=eq.'+encodeURIComponent(val));return uc;},
          async then(res){
            try{
              const url=SB_URL+'/rest/v1/'+table+'?'+_uf.join('&');
              const r=await fetch(url,{method:'PATCH',headers:H,body:JSON.stringify(data)});
              const txt=await r.text();
              res({data:txt?JSON.parse(txt):null,error:r.ok?null:{message:txt}});
            }catch(e){res({data:null,error:{message:e.message}});}
          }
        };
        return uc;
      },
      delete(){
        let _df=[];
        const dc={
          eq(col,val){_df.push(col+'=eq.'+encodeURIComponent(val));return dc;},
          async then(res){
            try{
              const url=SB_URL+'/rest/v1/'+table+'?'+_df.join('&');
              const r=await fetch(url,{method:'DELETE',headers:H});
              res({error:r.ok?null:{message:await r.text()}});
            }catch(e){res({error:{message:e.message}});}
          }
        };
        return dc;
      }
    };
  }
};

// ── HELPERS ───────────────────────────────────────────────
const $=id=>document.getElementById(id);
const ini=n=>n.split(' ').map(x=>x[0]).slice(0,2).join('');
const f2=v=>v!=null?parseFloat(v).toFixed(2):'—';
const f1=v=>v!=null?parseFloat(v).toFixed(1):'—';
const f0=v=>v!=null?parseFloat(v).toFixed(0):'—';
const avg=arr=>arr.length?arr.reduce((s,x)=>s+x,0)/arr.length:0;
function eMA(v){return v<=18?{l:'OK',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v<=22?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'REDUCIR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function eIMO(v){return v>=3.8?{l:'OPTIMO',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v>=3.5?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'MEJORAR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function eS6P(v){return v<=80?{l:'OPTIMO',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v<=100?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'REDUCIR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function pts(m){if(!m)return 0;let p=0;if(m.masa_adiposa>22)p+=2;else if(m.masa_adiposa>18)p+=1;if(m.s6p>100)p+=2;else if(m.s6p>80)p+=1;if(m.imo<3.5)p+=2;else if(m.imo<3.8)p+=1;return p;}
function prio(p){return p>=5?{l:'URGENTE',c:'badge-red'}:p>=3?{l:'ALTA',c:'badge-red'}:p>=2?{l:'MEDIA',c:'badge-yellow'}:p>=1?{l:'BAJA',c:'badge-yellow'}:{l:'OK',c:'badge-green'}}
function ultima(jid){const m=APP.meds.filter(x=>x.jugadora_id===jid);return m.length?m.reduce((a,b)=>a.n_medicion>b.n_medicion?a:b):null}
function medsJ(jid){return APP.meds.filter(x=>x.jugadora_id===jid).sort((a,b)=>a.n_medicion-b.n_medicion)}

let APP={session:null,planteles:[],jugs:[],meds:[],selPlantel:null,selJug:null,jugMeds:[],jugObj:null,search:'',filter:'todos',charts:[]};
function render(html){destroyCharts();$('app').innerHTML=html;}
function destroyCharts(){APP.charts.forEach(c=>{try{c.destroy()}catch(e){}});APP.charts=[];}

// ── CHART BUILDER ─────────────────────────────────────────
// Un grafico separado por cada masa/indicador (mas claro que uno solo con todo mezclado)
var CHART_SPECS=[
  {key:'masa_adiposa',suf:'MA',label:'Masa Adiposa (kg)',color:'#C55A11'},
  {key:'imo',suf:'IMO',label:'IMO (MM/MO)',color:'#2E75B6'},
  {key:'s6p',suf:'S6P',label:'S6P (mm)',color:'#70AD47'}
];
function chartBoxesHtml(prefix,titulo){
  return CHART_SPECS.map(function(s){
    return '<div class="card"><div class="card-title">'+titulo+' — '+s.label+'</div><div class="chart-box" style="height:190px"><canvas id="'+prefix+s.suf+'"></canvas></div></div>';
  }).join('');
}
function buildCharts(prefix,meds){
  const labels=meds.map(m=>'N'+m.n_medicion);
  CHART_SPECS.forEach(function(s){
    const ctx=$(prefix+s.suf);
    if(!ctx)return;
    const ch=new Chart(ctx,{
      type:'line',
      data:{labels:labels,datasets:[{label:s.label,data:meds.map(function(m){return m[s.key];}),borderColor:s.color,backgroundColor:s.color,tension:.3,pointRadius:4,fill:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:s.label,font:{size:10}}}}}
    });
    APP.charts.push(ch);
  });
}

// ── DIFF HELPERS ──────────────────────────────────────────
function bigDiff(label,nue,ant,up,fmt,unit){
  const d=nue-ant;const neu=Math.abs(d)<0.05;const ok=up?d>0:d<0;
  const col=neu?'#888':ok?'#1F7A4A':'#9C0006';
  const bg=neu?'#f5f5f5':ok?'#E8F5EC':'#FDEAEC';
  const icon=neu?'➡️':ok?(up?'📈':'📉'):(up?'📉':'📈');
  const arrow=neu?'Sin cambio':((d>0?'▲ +':'▼ ')+Math.abs(d).toFixed(2)+' '+unit);
  const txt=ok?'Mejoró':'A trabajar';
  return '<div class="big-diff" style="background:'+bg+'">'+
    '<div class="big-diff-icon">'+icon+'</div>'+
    '<div class="big-diff-content"><div class="big-diff-label">'+label+'</div>'+
    '<div class="big-diff-values">'+fmt(ant)+unit+' → '+fmt(nue)+unit+'</div></div>'+
    '<div style="text-align:right"><div class="big-diff-change" style="color:'+col+';background:'+(neu?'#eee':ok?'#C6EFCE':'#FFC7CE')+'">'+arrow+'</div>'+
    (neu?'':'<div style="font-size:11px;color:'+col+';margin-top:4px;font-weight:600">'+txt+'</div>')+'</div></div>';
}
function diffArrow(n,a,up){const d=n-a;if(Math.abs(d)<0.05)return '<span style="color:#aaa">—</span>';const ok=up?d>0:d<0;const col=ok?'#1F7A4A':'#9C0006';return '<span style="color:'+col+';font-size:11px;font-weight:600">'+(d>0?'▲':'▼')+Math.abs(d).toFixed(1)+'</span>';}

// ── MOTIVACIONAL ──────────────────────────────────────────
function mensajeMotivacional(meds){
  if(meds.length<2)return null;
  const ult=meds[meds.length-1],pen=meds[meds.length-2];
  const dMA=ult.masa_adiposa-pen.masa_adiposa;
  const dS6P=ult.s6p-pen.s6p;
  const dIMO=ult.imo-pen.imo;
  let logros=[];
  if(dMA<-0.05)logros.push('bajaste '+Math.abs(dMA).toFixed(1)+' kg de masa adiposa');
  if(dS6P<-0.5)logros.push('redujiste '+Math.abs(dS6P).toFixed(0)+' mm en pliegues');
  if(dIMO>0.02)logros.push('subiste tu IMO a '+ult.imo.toFixed(2));
  if(logros.length>=2)return {t:'¡Excelente progreso! 🎉',s:'En tu última medición '+logros.slice(0,2).join(' y ')+'. ¡Seguí así!'};
  if(logros.length===1)return {t:'¡Vas por buen camino! 💪',s:'En tu última medición '+logros[0]+'. ¡Seguí sumando!'};
  if(dMA>0.05||dS6P>0.5)return {t:'¡A meterle con todo! 🎯',s:'Esta medición tuvo algunos cambios para trabajar. Con constancia lo damos vuelta.'};
  return {t:'¡Manteniendo el nivel! ✨',s:'Tus valores se mantienen estables. La constancia es clave.'};
}


// ── LOGIN ─────────────────────────────────────────────────
function renderLogin(mode,err){
  mode=mode||'jugadora';err=err||'';
  var linkHtml = mode==='jugadora'
    ? '¿Sos el entrenador? <a href="#" onclick="renderLogin(&quot;admin&quot;);return false;" style="color:#2E75B6;font-weight:500">Acceso admin</a>'
    : '¿Sos jugadora? <a href="#" onclick="renderLogin(&quot;jugadora&quot;);return false;" style="color:#2E75B6;font-weight:500">Volver</a>';
  render(
  '<div class="login-wrap"><div class="login-card">'+
    '<div class="login-logo"><div class="login-logo-circle">P</div>'+
    '<div class="login-title">Polital</div>'+
    '<div class="login-sub">'+(mode==='admin'?'Acceso administrador':'Sistema Antropométrico')+'</div></div>'+
    (err?'<div class="msg-error">'+err+'</div>':'')+
    '<div class="form-group"><label>Usuario</label><input id="lu" placeholder="tu usuario" autocapitalize="none" autocorrect="off"/></div>'+
    '<div class="form-group"><label>Contraseña</label><input id="lp" type="password" placeholder="clave"/></div>'+
    '<button class="btn btn-primary btn-full" onclick="doLogin(&quot;'+mode+'&quot;)">Ingresar</button>'+
    '<div style="text-align:center;font-size:13px;color:#888;margin-top:1rem;padding-top:1rem;border-top:1px solid #eee">'+linkHtml+'</div>'+
  '</div></div>');
  var lp=$('lp');
  if(lp)lp.onkeydown=function(e){if(e.key==='Enter')doLogin(mode);};
}

async function doLogin(mode){
  var u=$('lu')?$('lu').value.trim().toLowerCase():'';
  var p=$('lp')?$('lp').value:'';
  if(!u||!p){renderLogin(mode,'Completá usuario y contraseña');return;}
  if(mode==='admin'){
    if(u==='agus'&&p==='polital2024'){APP.session={role:'admin'};await loadAdmin();renderAdmin();}
    else renderLogin(mode,'Usuario o contraseña incorrectos');
    return;
  }
  var r=await sb.from('jugadoras').select('*,planteles(nombre)').eq('usuario',u).eq('activa',true).single();
  if(r.error||!r.data){renderLogin(mode,'Usuario no encontrado');return;}
  if(r.data.password_hash!==p){renderLogin(mode,'Contraseña incorrecta');return;}
  APP.session={role:'jugadora',id:r.data.id,nombre:r.data.nombre,plantel:r.data.planteles?r.data.planteles.nombre:''};
  var m=await sb.from('mediciones').select('*').eq('jugadora_id',r.data.id).order('n_medicion');
  var o=await sb.from('objetivos').select('*').eq('jugadora_id',r.data.id).single();
  APP.jugMeds=m.data||[];APP.jugObj=o.data;

      content+='<div class="metric-grid">'+
        '<div class="metric-card" style="border-top:3px solid '+ma.h+'"><div class="metric-label">Masa Adiposa</div><div class="metric-value">'+f2(ult.masa_adiposa)+'</div><div class="metric-label">kg</div><span class="metric-badge '+ma.c+'">'+ma.l+'</span></div>'+
        '<div class="metric-card" style="border-top:3px solid '+imo.h+'"><div class="metric-label">IMO</div><div class="metric-value">'+f2(ult.imo)+'</div><div class="metric-label">MM/MO</div><span class="metric-badge '+imo.c+'">'+imo.l+'</span></div>'+
        '<div class="metric-card" style="border-top:3px solid '+s6p.h+'"><div class="metric-label">S6P</div><div class="metric-value">'+f0(ult.s6p)+'</div><div class="metric-label">mm</div><span class="metric-badge '+s6p.c+'">'+s6p.l+'</span></div>'+
      '</div>';
      if(pen){
        content+='<div class="card"><div class="card-title">📊 Comparación con medición anterior</div>';
        content+=bigDiff('Masa Adiposa',ult.masa_adiposa,pen.masa_adiposa,false,f2,' kg');
        content+=bigDiff('IMO',ult.imo,pen.imo,true,f2,'');
        content+=bigDiff('S6P',ult.s6p,pen.s6p,false,f0,' mm');
        content+='</div>';
      }
      if(APP.jugObj){
        var o=APP.jugObj;
        content+='<div class="card"><div class="card-title">🎯 Mis objetivos</div>';
        if(o.notas)content+='<div style="margin-bottom:12px;padding:10px;background:#f5f7fa;border-radius:8px;font-size:13px;color:#555">📝 '+o.notas+'</div>';
        var objs=[[o.ma_objetivo,ult.masa_adiposa,'MA objetivo','kg',false],[o.imo_objetivo,ult.imo,'IMO objetivo','',true],[o.s6p_objetivo,ult.s6p,'S6P objetivo','mm',false]];
        objs.forEach(function(row){
          var obj=row[0],actual=row[1],label=row[2],u=row[3],up=row[4];

            '<div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-size:11px;color:#aaa">Actual: '+f1(actual)+u+'</span><span style="font-size:11px;color:#aaa">Meta: '+obj+u+'</span></div></div>';
        });
        content+='</div>';
      }

      });
      content+='<div style="background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden;overflow-x:auto"><table class="data-table"><thead><tr><th>N°</th><th>Fecha</th><th>MA</th><th>Δ</th><th>IMO</th><th>Δ</th><th>S6P</th><th>Δ</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
  } else {
    var rows2=meds.slice().reverse().map(function(m){return '<tr><td>'+(m.fecha||'—')+'</td><td style="font-weight:600">N'+m.n_medicion+'</td><td style="color:'+eMA(m.masa_adiposa).h+';font-weight:600">'+f2(m.masa_adiposa)+'</td><td style="color:'+eIMO(m.imo).h+';font-weight:600">'+f2(m.imo)+'</td><td style="color:'+eS6P(m.s6p).h+';font-weight:600">'+f0(m.s6p)+'</td></tr>';}).join('');
    content='<div style="background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden"><table class="data-table"><thead><tr><th>Fecha</th><th>N°</th><th>MA (kg)</th><th>IMO</th><th>S6P (mm)</th></tr></thead><tbody>'+(rows2||'<tr><td colspan=5 style="text-align:center;color:#aaa;padding:2rem">Sin mediciones</td></tr>')+'</tbody></table></div>';

  var ch=new Chart(ctx,{type:'bar',data:{labels:arr.map(function(x){return x.j.nombre.split(' ')[0];}),datasets:[
    {label:'MA',data:arr.map(function(x){return x.u.masa_adiposa;}),backgroundColor:'#C55A11'},

      '<td style="color:'+eIMO(m.imo).h+';font-weight:600">'+f2(m.imo)+'</td><td>'+(prev?diffArrow(m.imo,prev.imo,true):'')+'</td>'+
      '<td style="color:'+eS6P(m.s6p).h+';font-weight:600">'+f0(m.s6p)+'</td><td>'+(prev?diffArrow(m.s6p,prev.s6p,false):'')+'</td></tr>';
  }).join('');
  content+='<div style="background:#fff;border:1px solid #e5e9f0;border-radius:12px;overflow:hidden;overflow-x:auto;margin-top:1rem"><table class="data-table"><thead><tr><th>Fecha</th><th>N°</th><th>Peso</th><th>MA</th><th>Δ</th><th>IMO</th><th>Δ</th><th>S6P</th><th>Δ</th></tr></thead><tbody>'+(rows||'<tr><td colspan=9 style="text-align:center;color:#aaa;padding:2rem">Sin mediciones</td></tr>')+'</tbody></table></div>';
  render(nav+'<div class="page">'+content+'</div>');
  if(meds.length>=2)setTimeout(function(){buildCharts('det',meds);},50);
}

function showModal(title,body,footer){
  var ex=$('modal-overlay');if(ex)ex.remove();
  var div=document.createElement('div');
  div.id='modal-overlay';div.className='modal-overlay';
  div.onclick=function(e){if(e.target===div)div.remove();};
  div.innerHTML='<div class="modal"><div class="modal-title">'+title+'</div><div id="modal-body">'+body+'</div><div class="modal-footer">'+footer+'</div></div>';
  document.body.appendChild(div);
}

async function savePass(){
  var act=$('cp-act')?$('cp-act').value:'';var nw=$('cp-new')?$('cp-new').value:'';var rep=$('cp-rep')?$('cp-rep').value:'';
  var err=$('cp-err');

  if(nw!==rep){err.innerHTML='<div class="msg-error">Las contraseñas no coinciden</div>';return;}
  if(nw.length<6){err.innerHTML='<div class="msg-error">Mínimo 6 caracteres</div>';return;}
  var r=await sb.from('jugadoras').select('password_hash').eq('id',APP.session.id).single();
  if(r.error||!r.data){err.innerHTML='<div class="msg-error">Error al verificar</div>';return;}
  if(r.data.password_hash!==act){err.innerHTML='<div class="msg-error">La contraseña actual es incorrecta</div>';return;}
  var u=await sb.from('jugadoras').update({password_hash:nw}).eq('id',APP.session.id);
  if(u.error){err.innerHTML='<div class="msg-error">'+u.error.message+'</div>';return;}
  closeModal();alert('¡Contraseña actualizada!');

// ── LECTOR DE EXCEL (Proc datos brutos) ───────────────────
function parseFechaDeNombre(filename){
  var m=filename.match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
  if(!m)return null;
  var d=parseInt(m[1],10),mo=parseInt(m[2],10),y=parseInt(m[3],10);
  if(y>100)y=parseInt(String(y).slice(0,2),10);
  if(y<100)y+=2000;
  if(mo<1||mo>12||d<1||d>31)return null;
  return String(d).padStart(2,'0')+'/'+String(mo).padStart(2,'0')+'/'+y;
}
function handleExcelFile(file){
  var elErr=$('mxerr'),elOk=$('mxok');
  if(elErr)elErr.innerHTML='';
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var sheetName=wb.SheetNames.find(function(n){return n.trim()==='Proc datos brutos';});
      if(!sheetName){if(elErr)elErr.innerHTML='<div class="msg-error">No encontré la hoja "Proc datos brutos" en ese archivo.</div>';return;}
      var ws=wb.Sheets[sheetName];
      var cell=function(ref){var c=ws[ref];return c?c.v:null;};
      var peso=cell('B6'),talla=cell('B7'),ma=cell('I50'),mm=cell('I51'),mo=cell('I53'),s6p=cell('B50');
      if(ma==null||mm==null||mo==null||s6p==null){if(elErr)elErr.innerHTML='<div class="msg-error">El archivo no tiene todos los valores esperados (MA/MM/MO/S6P). Revisalo a mano.</div>';return;}
      if($('mpe'))$('mpe').value=peso!=null?peso:'';
      if($('mta'))$('mta').value=talla!=null?talla:'';
      if($('mma'))$('mma').value=typeof ma==='number'?ma.toFixed(3):ma;
      if($('mmm'))$('mmm').value=typeof mm==='number'?mm.toFixed(3):mm;
      if($('mmo'))$('mmo').value=typeof mo==='number'?mo.toFixed(3):mo;
      if($('ms6'))$('ms6').value=typeof s6p==='number'?s6p.toFixed(1):s6p;
      var fechaNombre=parseFechaDeNombre(file.name);
      if(fechaNombre&&$('mf')&&!$('mf').value)$('mf').value=fechaNombre;
      if(elOk)elOk.innerHTML='<div class="msg-success">✅ Datos leídos de "'+file.name+'". Revisá los valores y la fecha antes de guardar.</div>';
    }catch(err){
      if(elErr)elErr.innerHTML='<div class="msg-error">No pude leer ese archivo (¿es un .xlsm/.xlsx válido?): '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}
function dzOver(e){e.preventDefault();e.currentTarget.classList.add('drag');}
function dzLeave(e){e.currentTarget.classList.remove('drag');}
function dzDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f)handleExcelFile(f);
}
