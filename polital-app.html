<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh}
.nav{background:#1F4E79;padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}

.nav-logo{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}

.page{max-width:820px;margin:0 auto;padding:1.25rem}
.card{background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}

.metric-label{font-size:11px;color:#888;margin-bottom:6px}

.metric-badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-green{background:#C6EFCE;color:#1F7A4A}
.badge-yellow{background:#FFEB9C;color:#9C6500}

.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e9f0;margin-bottom:1.25rem;overflow-x:auto}

.player-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border:1px solid #e5e9f0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}

.stat-label{font-size:12px;color:#888;margin-bottom:6px}

.plantel-btns{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}

.diff-row:last-child{border-bottom:none}
.big-diff{display:flex;align-items:center;gap:8px;padding:16px;border-radius:12px;margin-bottom:10px}
.big-diff-icon{font-size:28px}
.big-diff-content{flex:1}

.big-diff-values{font-size:15px;font-weight:600}
.big-diff-change{font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px}
.motiv-card{background:linear-gradient(135deg,#1F7A4A 0%,#2E9B5F 100%);color:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.motiv-title{font-size:16px;font-weight:700;margin-bottom:4px}
.motiv-text{font-size:13px;opacity:.95}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}
.search-box:focus{border-color:#1F4E79}
.filter-btns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;font-size:12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer}
.filter-btn.active{background:#1F4E79;color:#fff;border-color:#1F4E79}
.chart-box{position:relative;height:260px;width:100%}
.dropzone{border:2px dashed #c7d2e0;border-radius:10px;padding:16px;text-align:center;font-size:13px;color:#888;margin-bottom:14px;cursor:pointer;transition:border-color .15s,background .15s}

.dropzone.drag{border-color:#1F4E79;background:#eef4fa;color:#1F4E79}
.hidden{display:none!important}
@media(max-width:500px){.metric-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.progress-label{width:120px}}

const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

// ── SUPABASE CLIENT ───────────────────────────────────────
const sb={
  from(table){
    let _sel='*',_fil=[],_ord=null,_single=false;
    const c={
      select(s){_sel=s;return c;},
      eq(col,val){_fil.push(col+'=eq.'+encodeURIComponent(val));return c;},
      order(col,opts){_ord=col+(opts&&opts.ascending===false?'.desc':'.asc');return c;},
      single(){_single=true;return c;},
      async then(res){
        let url=SB_URL+'/rest/v1/'+table+'?select='+encodeURIComponent(_sel);
        _fil.forEach(f=>url+='&'+f);
        if(_ord)url+='&order='+_ord;
        const h=Object.assign({},H);
        if(_single)h['Accept']='application/vnd.pgrst.object+json';
        try{
          const r=await fetch(url,{headers:h});
          const txt=await r.text();
          const data=txt?JSON.parse(txt):null;
          res({data:r.ok?data:null,error:r.ok?null:{message:txt}});
        }catch(e){res({data:null,error:{message:e.message}});}
      }
    };
    return {
      select(s){if(s)_sel=s;return c;},
      eq(col,val){_fil.push(col+'=eq.'+encodeURIComponent(val));return c;},
      single(){_single=true;return c;},
      order(col,opts){_ord=col+(opts&&opts.ascending===false?'.desc':'.asc');return c;},
      async insert(data){
        try{
          const r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:H,body:JSON.stringify(Array.isArray(data)?data:[data])});
          const txt=await r.text();
          return {data:txt?JSON.parse(txt):null,error:r.ok?null:{message:txt}};
        }catch(e){return {data:null,error:{message:e.message}};}
      },
      update(data){
        let _uf=[];
        const uc={
          eq(col,val){_uf.push(col+'=eq.'+encodeURIComponent(val));return uc;},
          async then(res){
            try{
              const url=SB_URL+'/rest/v1/'+table+'?'+_uf.join('&');
              const r=await fetch(url,{method:'PATCH',headers:H,body:JSON.stringify(data)});
              const txt=await r.text();
              res({data:txt?JSON.parse(txt):null,error:r.ok?null:{message:txt}});
            }catch(e){res({data:null,error:{message:e.message}});}
          }
        };
        return uc;
      },
      delete(){
        let _df=[];
        const dc={
          eq(col,val){_df.push(col+'=eq.'+encodeURIComponent(val));return dc;},
          async then(res){
            try{
              const url=SB_URL+'/rest/v1/'+table+'?'+_df.join('&');
              const r=await fetch(url,{method:'DELETE',headers:H});
              res({error:r.ok?null:{message:await r.text()}});
            }catch(e){res({error:{message:e.message}});}
          }
        };
        return dc;
      }
    };
  }
};

// ── STORAGE (PDF planes) ──────────────────────────────────
async function subirArchivoStorage(bucket,path,file){
  try{
    const url=SB_URL+'/storage/v1/object/'+bucket+'/'+encodeURIComponent(path);
    const r=await fetch(url,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'x-upsert':'true','Content-Type':file.type||'application/pdf'},body:file});
    if(!r.ok){return {error:{message:await r.text()}};}
    const pub=SB_URL+'/storage/v1/object/public/'+bucket+'/'+encodeURIComponent(path);
    return {url:pub,error:null};
  }catch(e){return {error:{message:e.message}};}
}

// ── HELPERS ───────────────────────────────────────────────
const $=id=>document.getElementById(id);
const ini=n=>n.split(' ').map(x=>x[0]).slice(0,2).join('');
const f2=v=>v!=null?parseFloat(v).toFixed(2):'—';
const f1=v=>v!=null?parseFloat(v).toFixed(1):'—';
const f0=v=>v!=null?parseFloat(v).toFixed(0):'—';
const avg=arr=>arr.length?arr.reduce((s,x)=>s+x,0)/arr.length:0;
const BAREMO_DEFAULT={ma_optimo:18,ma_revisar:22,imo_optimo:3.8,imo_revisar:3.5,s6p_optimo:80,s6p_revisar:100};
function baremoDe(deporte){return (APP.baremos&&APP.baremos[deporte])||BAREMO_DEFAULT;}
function eMA(v,deporte){var b=baremoDe(deporte);return v<=b.ma_optimo?{l:'OK',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v<=b.ma_revisar?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'REDUCIR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function eIMO(v,deporte){var b=baremoDe(deporte);return v>=b.imo_optimo?{l:'OPTIMO',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v>=b.imo_revisar?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'MEJORAR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function eS6P(v,deporte){var b=baremoDe(deporte);return v<=b.s6p_optimo?{l:'OPTIMO',c:'badge-green',h:'#1F7A4A',b:'#C6EFCE'}:v<=b.s6p_revisar?{l:'REVISAR',c:'badge-yellow',h:'#9C6500',b:'#FFEB9C'}:{l:'REDUCIR',c:'badge-red',h:'#9C0006',b:'#FFC7CE'}}
function pts(m,deporte){if(!m)return 0;var b=baremoDe(deporte);let p=0;if(m.masa_adiposa>b.ma_revisar)p+=2;else if(m.masa_adiposa>b.ma_optimo)p+=1;if(m.s6p>b.s6p_revisar)p+=2;else if(m.s6p>b.s6p_optimo)p+=1;if(m.imo<b.imo_revisar)p+=2;else if(m.imo<b.imo_optimo)p+=1;return p;}
function prio(p){return p>=5?{l:'URGENTE',c:'badge-red'}:p>=3?{l:'ALTA',c:'badge-red'}:p>=2?{l:'MEDIA',c:'badge-yellow'}:p>=1?{l:'BAJA',c:'badge-yellow'}:{l:'OK',c:'badge-green'}}
function ultima(jid){const m=APP.meds.filter(x=>x.jugadora_id===jid);return m.length?m.reduce((a,b)=>a.n_medicion>b.n_medicion?a:b):null}
function medsJ(jid){return APP.meds.filter(x=>x.jugadora_id===jid).sort((a,b)=>a.n_medicion-b.n_medicion)}
function calcEdad(fechaNac){
  if(!fechaNac)return null;
  var d=null;
  var m=String(fechaNac).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)d=new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  else{var m2=String(fechaNac).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m2)d=new Date(parseInt(m2[3]),parseInt(m2[2])-1,parseInt(m2[1]));}
  if(!d||isNaN(d.getTime()))return null;
  var hoy=new Date();
  var edad=hoy.getFullYear()-d.getFullYear();
  var mDiff=hoy.getMonth()-d.getMonth();
  if(mDiff<0||(mDiff===0&&hoy.getDate()<d.getDate()))edad--;
  return edad;
}
function diasDesde(fechaStr){
  if(!fechaStr||fechaStr==='—'||fechaStr==='S/D')return null;
  var m=fechaStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m)return null;
  var d=new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  if(isNaN(d.getTime()))return null;
  return Math.round((new Date()-d)/86400000);
}

let APP={session:null,planteles:[],jugs:[],meds:[],baremos:{},selPlantel:null,selJug:null,selJugObj:null,jugMeds:[],jugObj:null,search:'',filter:'todos',orderAntig:false,charts:[]};
function render(html){destroyCharts();$('app').innerHTML=html;}
function destroyCharts(){APP.charts.forEach(c=>{try{c.destroy()}catch(e){}});APP.charts=[];}

// ── CHART BUILDER ─────────────────────────────────────────
// Un grafico separado por cada masa/indicador (mas claro que uno solo con todo mezclado)
var CHART_SPECS=[
  {key:'masa_adiposa',objKey:'ma_objetivo',suf:'MA',label:'Masa Adiposa (kg)',color:'#C55A11'},
  {key:'imo',objKey:'imo_objetivo',suf:'IMO',label:'IMO (MM/MO)',color:'#2E75B6'},
  {key:'s6p',objKey:'s6p_objetivo',suf:'S6P',label:'S6P (mm)',color:'#70AD47'}
];
function chartBoxesHtml(prefix,titulo){
  return CHART_SPECS.map(function(s){
    return '<div class="card"><div class="card-title">'+titulo+' — '+s.label+'</div><div class="chart-box" style="height:190px"><canvas id="'+prefix+s.suf+'"></canvas></div></div>';
  }).join('');
}
function buildCharts(prefix,meds,objetivo){
  const labels=meds.map(m=>'N'+m.n_medicion);
  CHART_SPECS.forEach(function(s){
    const ctx=$(prefix+s.suf);
    if(!ctx)return;
    const datasets=[{label:s.label,data:meds.map(function(m){return m[s.key];}),borderColor:s.color,backgroundColor:s.color,tension:.3,pointRadius:4,fill:false}];
    var objVal=objetivo&&objetivo[s.objKey];
    if(objVal){
      datasets.push({label:'Objetivo',data:labels.map(function(){return objVal;}),borderColor:'#999',borderDash:[6,4],pointRadius:0,fill:false});
    }
    const ch=new Chart(ctx,{
      type:'line',
      data:{labels:labels,datasets:datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:!!objVal,position:'bottom',labels:{boxWidth:10,font:{size:10}}}},scales:{y:{title:{display:true,text:s.label,font:{size:10}}}}}
    });
    APP.charts.push(ch);
  });
}

// ── DIFF HELPERS ──────────────────────────────────────────
function bigDiff(label,nue,ant,up,fmt,unit){
  const d=nue-ant;const neu=Math.abs(d)<0.05;const ok=up?d>0:d<0;
  const col=neu?'#888':ok?'#1F7A4A':'#9C0006';
  const bg=neu?'#f5f5f5':ok?'#E8F5EC':'#FDEAEC';
  const icon=neu?'➡️':ok?(up?'📈':'📉'):(up?'📉':'📈');
  const arrow=neu?'Sin cambio':((d>0?'▲ +':'▼ ')+Math.abs(d).toFixed(2)+' '+unit);
  const txt=ok?'Mejoró':'A trabajar';
  return '<div class="big-diff" style="background:'+bg+'">'+
    '<div class="big-diff-icon">'+icon+'</div>'+
    '<div class="big-diff-content"><div class="big-diff-label">'+label+'</div>'+
    '<div class="big-diff-values">'+fmt(ant)+unit+' → '+fmt(nue)+unit+'</div></div>'+
    '<div style="text-align:right"><div class="big-diff-change" style="color:'+col+';background:'+(neu?'#eee':ok?'#C6EFCE':'#FFC7CE')+'">'+arrow+'</div>'+
    (neu?'':'<div style="font-size:11px;color:'+col+';margin-top:4px;font-weight:600">'+txt+'</div>')+'</div></div>';
}
function diffArrow(n,a,up){const d=n-a;if(Math.abs(d)<0.05)return '<span style="color:#aaa">—</span>';const ok=up?d>0:d<0;const col=ok?'#1F7A4A':'#9C0006';return '<span style="color:'+col+';font-size:11px;font-weight:600">'+(d>0?'▲':'▼')+Math.abs(d).toFixed(1)+'</span>';}

// ── MOTIVACIONAL ──────────────────────────────────────────
function mensajeMotivacional(meds){
  if(meds.length<2)return null;
  const ult=meds[meds.length-1],pen=meds[meds.length-2];
  const dMA=ult.masa_adiposa-pen.masa_adiposa;
  const dS6P=ult.s6p-pen.s6p;
  const dIMO=ult.imo-pen.imo;
  let logros=[];
  if(dMA<-0.05)logros.push('bajaste '+Math.abs(dMA).toFixed(1)+' kg de masa adiposa');
  if(dS6P<-0.5)logros.push('redujiste '+Math.abs(dS6P).toFixed(0)+' mm en pliegues');
  if(dIMO>0.02)logros.push('subiste tu IMO a '+ult.imo.toFixed(2));
  if(logros.length>=2)return {t:'¡Excelente progreso! 🎉',s:'En tu última medición '+logros.slice(0,2).join(' y ')+'. ¡Seguí así!'};
  if(logros.length===1)return {t:'¡Vas por buen camino! 💪',s:'En tu última medición '+logros[0]+'. ¡Seguí sumando!'};
  if(dMA>0.05||dS6P>0.5)return {t:'¡A meterle con todo! 🎯',s:'Esta medición tuvo algunos cambios para trabajar. Con constancia lo damos vuelta.'};
  return {t:'¡Manteniendo el nivel! ✨',s:'Tus valores se mantienen estables. La constancia es clave.'};
}

function saveSession(){try{localStorage.setItem('polital_session',JSON.stringify(APP.session));}catch(e){}}
function logout(){try{localStorage.removeItem('polital_session');}catch(e){}APP.session=null;renderLogin();}

async function doLogin(mode){
  var u=$('lu')?$('lu').value.trim().toLowerCase():'';
  var p=$('lp')?$('lp').value:'';
  if(!u||!p){renderLogin(mode,'Completá usuario y contraseña');return;}
  if(mode==='admin'){
    if(u==='agus'&&p==='polital2024'){APP.session={role:'admin'};saveSession();await loadAdmin();renderAdmin();}
    else renderLogin(mode,'Usuario o contraseña incorrectos');
    return;
  }
  var r=await sb.from('jugadoras').select('*,planteles(nombre)').eq('usuario',u).eq('activa',true).single();
  if(r.error||!r.data){renderLogin(mode,'Usuario no encontrado');return;}
  if(r.data.password_hash!==p){renderLogin(mode,'Contraseña incorrecta');return;}
  APP.session={role:'jugadora',id:r.data.id,nombre:r.data.nombre,plantel:r.data.planteles?r.data.planteles.nombre:''};
  saveSession();
  await cargarJugadoraSesion(r.data.id,r.data);
  renderJugadora();
}
async function cargarJugadoraSesion(jid,jugData){
  await loadBaremos();
  var m=await sb.from('mediciones').select('*').eq('jugadora_id',jid).order('n_medicion');
  var o=await sb.from('objetivos').select('*').eq('jugadora_id',jid).single();
  APP.jugMeds=m.data||[];APP.jugObj=o.data;
  if(jugData)APP.session.jugadora=jugData;
}
async function bootstrap(){
  var raw=null;
  try{raw=localStorage.getItem('polital_session');}catch(e){}
  if(!raw){renderLogin();return;}
  var s=null;
  try{s=JSON.parse(raw);}catch(e){}
  if(!s||!s.role){renderLogin();return;}
  APP.session=s;
  if(s.role==='admin'){await loadAdmin();renderAdmin();}
  else if(s.role==='jugadora'){
    var r=await sb.from('jugadoras').select('*,planteles(nombre)').eq('id',s.id).single();
    if(r.error||!r.data){logout();return;}
    APP.session.nombre=r.data.nombre;APP.session.plantel=r.data.planteles?r.data.planteles.nombre:'';
    await cargarJugadoraSesion(s.id,r.data);
    renderJugadora();
  } else renderLogin();
}

function buildTeamCharts(jugs){
  var porJug=jugs.map(function(j){return medsJ(j.id);}).filter(function(m){return m.length;});
  if(!porJug.length)return;
  var maxN=Math.max.apply(null,porJug.map(function(m){return m[m.length-1].n_medicion;}));
  var labels=[],avgs={masa_adiposa:[],imo:[],s6p:[]};
  for(var n=1;n<=maxN;n++){
    labels.push('N'+n);
    ['masa_adiposa','imo','s6p'].forEach(function(key){
      var vals=[];
      porJug.forEach(function(m){var row=m.find(function(x){return x.n_medicion===n;});if(row&&row[key]!=null)vals.push(row[key]);});
      avgs[key].push(vals.length?avg(vals):null);
    });
  }
  CHART_SPECS.forEach(function(s){
    var ctx=$('team'+s.suf);if(!ctx)return;
    var ch=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'Promedio '+s.label,data:avgs[s.key],borderColor:s.color,backgroundColor:s.color,tension:.3,pointRadius:4,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:s.label,font:{size:10}}}}}});
    APP.charts.push(ch);
  });
}

// ── LECTOR DE EXCEL (Proc datos brutos) ───────────────────
function parseFechaDeNombre(filename){
  var m=filename.match(/(\d{1,2})\.(\d{1,2})\.(\d{2,4})/);
  if(!m)return null;
  var d=parseInt(m[1],10),mo=parseInt(m[2],10),y=parseInt(m[3],10);
  if(y>100)y=parseInt(String(y).slice(0,2),10);
  if(y<100)y+=2000;
  if(mo<1||mo>12||d<1||d>31)return null;
  return String(d).padStart(2,'0')+'/'+String(mo).padStart(2,'0')+'/'+y;
}
function excelSerialToDMY(v){
  if(v==null)return null;
  if(typeof v==='number'){
    var d=XLSX.SSF.parse_date_code(v);
    if(!d)return null;
    return String(d.d).padStart(2,'0')+'/'+String(d.m).padStart(2,'0')+'/'+d.y;
  }
  return String(v);
}
function leerExcelMedicion(wb){
  var sheetName=wb.SheetNames.find(function(n){return n.trim()==='Proc datos brutos';});
  if(!sheetName)return {error:'No encontré la hoja "Proc datos brutos" en ese archivo.'};
  var ws=wb.Sheets[sheetName];
  var cell=function(ref){var c=ws[ref];return c?c.v:null;};
  var peso=cell('B6'),talla=cell('B7'),ma=cell('I50'),mm=cell('I51'),mo=cell('I53'),s6p=cell('B50');
  if(ma==null||mm==null||mo==null||s6p==null)return {error:'El archivo no tiene todos los valores esperados (MA/MM/MO/S6P).'};
  var fechaNacimiento=excelSerialToDMY(cell('E3'));
  var fechaHoja=excelSerialToDMY(cell('B3'));
  var deporte=cell('C1');
  var posicion=null;
  if(wb.SheetNames.indexOf('ANAMNESIS')>=0){
    try{posicion=wb.Sheets['ANAMNESIS']['C3']?wb.Sheets['ANAMNESIS']['C3'].v:null;}catch(e){}
  }
  return {peso:peso,talla:talla,ma:ma,mm:mm,mo:mo,s6p:s6p,fechaNacimiento:fechaNacimiento,fechaHoja:fechaHoja,deporte:deporte,posicion:posicion};
}
var APP_EXTRA={};
function handleExcelFile(file){
  var elErr=$('mxerr'),elOk=$('mxok');
  if(elErr)elErr.innerHTML='';
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var d=leerExcelMedicion(wb);
      if(d.error){if(elErr)elErr.innerHTML='<div class="msg-error">'+d.error+' Revisalo a mano.</div>';return;}
      if($('mpe'))$('mpe').value=d.peso!=null?d.peso:'';
      if($('mta'))$('mta').value=d.talla!=null?d.talla:'';
      if($('mma'))$('mma').value=typeof d.ma==='number'?d.ma.toFixed(3):d.ma;
      if($('mmm'))$('mmm').value=typeof d.mm==='number'?d.mm.toFixed(3):d.mm;
      if($('mmo'))$('mmo').value=typeof d.mo==='number'?d.mo.toFixed(3):d.mo;
      if($('ms6'))$('ms6').value=typeof d.s6p==='number'?d.s6p.toFixed(1):d.s6p;
      var fechaNombre=parseFechaDeNombre(file.name);
      if(fechaNombre&&$('mf')&&!$('mf').value)$('mf').value=fechaNombre;
      APP_EXTRA={fecha_nacimiento:d.fechaNacimiento,posicion:d.posicion,deporte:d.deporte};
      if(elOk)elOk.innerHTML='<div class="msg-success">✅ Datos leídos de "'+file.name+'". Revisá los valores y la fecha antes de guardar.</div>';
    }catch(err){
      if(elErr)elErr.innerHTML='<div class="msg-error">No pude leer ese archivo (¿es un .xlsm/.xlsx válido?): '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}
function dzOver(e){e.preventDefault();e.currentTarget.classList.add('drag');}
function dzLeave(e){e.currentTarget.classList.remove('drag');}
function dzDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f)handleExcelFile(f);
}

// ── CARGA MASIVA DE ZIP (tira completa) ────────────────────
function normalizeNombre(s){
  return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}
var ZIP_REVIEW=[];
function modalCargarZip(){
  ZIP_REVIEW=[];
  showModal('Cargar tira completa (ZIP)',
    '<div id="zipdrop" class="dropzone" ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDropZip(event)" onclick="document.getElementById(&quot;zipfile&quot;).click()">'+
      '📦 Arrastrá el ZIP de la tira acá, o hacé click para elegirlo<br/><span style="font-size:11px">Una carpeta por jugadora, como veníamos usando</span>'+
    '</div>'+
    '<input type="file" id="zipfile" accept=".zip" style="display:none" onchange="handleZipFile(this.files[0])"/>'+
    '<div id="zipstatus"></div><div id="zipreview"></div>',
    '<button class="btn btn-secondary" onclick="closeModal();renderAdmin()">Cerrar</button><button class="btn btn-primary hidden" id="zipCargarBtn" onclick="insertarZipReview()">Cargar todo</button>');
}
function dzDropZip(e){
  e.preventDefault();e.currentTarget.classList.remove('drag');
  var f=e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f)handleZipFile(f);
}
async function handleZipFile(file){
  var st=$('zipstatus');
  if(!file)return;
  st.innerHTML='<div style="font-size:12px;color:#888">Leyendo ZIP...</div>';
  try{
    var zip=await JSZip.loadAsync(file);
    var porCarpeta={};
    var nombres=Object.keys(zip.files);
    for(var i=0;i<nombres.length;i++){
      var entry=zip.files[nombres[i]];
      if(entry.dir)continue;
      if(!/\.xlsm$/i.test(entry.name))continue;
      var partes=entry.name.split('/');
      if(partes.length<2)continue;
      var carpeta=partes[0];
      var fname=partes[partes.length-1];
      var buf=await entry.async('arraybuffer');
      var wb;
      try{wb=XLSX.read(new Uint8Array(buf),{type:'array'});}catch(e){continue;}
      var d=leerExcelMedicion(wb);
      if(d.error)continue;
      (porCarpeta[carpeta]=porCarpeta[carpeta]||[]).push({fname:fname,d:d,fecha:parseFechaDeNombre(fname)||d.fechaHoja||null});
    }
    // dedup exacto dentro de cada carpeta (mismo patron que usamos a mano)
    var filas=[];
    Object.keys(porCarpeta).sort().forEach(function(carpeta){
      var arr=porCarpeta[carpeta];
      var vistos={};
      var unicos=[];
      arr.forEach(function(r){
        var key=[r.d.ma&&r.d.ma.toFixed(6),r.d.mm&&r.d.mm.toFixed(6),r.d.mo,r.d.s6p].join('|');
        if(!vistos[key]){vistos[key]=r;unicos.push(r);}
        else if(r.fecha&&vistos[key].fecha&&r.fecha<vistos[key].fecha){
          var idx=unicos.indexOf(vistos[key]);unicos[idx]=r;vistos[key]=r;
        }
      });
      unicos.sort(function(a,b){return (a.fecha||'9999')<(b.fecha||'9999')?-1:1;});
      var norm=normalizeNombre(carpeta);
      var match=APP.jugs.find(function(j){return normalizeNombre(j.nombre)===norm;});
      if(!match)match=APP.jugs.find(function(j){return normalizeNombre(j.nombre).indexOf(norm)>=0||norm.indexOf(normalizeNombre(j.nombre))>=0;});
      unicos.forEach(function(r){
        filas.push({carpeta:carpeta,jugId:match?match.id:'',fname:r.fname,fecha:r.fecha||'',peso:r.d.peso,talla:r.d.talla,ma:r.d.ma,mm:r.d.mm,mo:r.d.mo,s6p:r.d.s6p,incluir:true});
      });
    });
    ZIP_REVIEW=filas;
    st.innerHTML='<div class="msg-success">✅ '+filas.length+' mediciones encontradas en '+Object.keys(porCarpeta).length+' carpetas. Revisá abajo antes de cargar (la jugadora sin match queda en blanco, elegila a mano).</div>';
    renderZipReview();
    var btn=$('zipCargarBtn');if(btn)btn.classList.remove('hidden');
  }catch(err){
    st.innerHTML='<div class="msg-error">No pude leer el ZIP: '+err.message+'</div>';
  }
}
function renderZipReview(){
  var jugOpts=APP.jugs.slice().sort(function(a,b){return a.nombre.localeCompare(b.nombre);})
    .map(function(j){return '<option value="'+j.id+'">'+j.nombre+'</option>';}).join('');
  var rows=ZIP_REVIEW.map(function(r,i){
    return '<tr>'+
      '<td><input type="checkbox" '+(r.incluir?'checked':'')+' onchange="ZIP_REVIEW['+i+'].incluir=this.checked"/></td>'+
      '<td style="font-size:11px">'+r.carpeta+'<br/><span style="color:#aaa">'+r.fname+'</span></td>'+
      '<td><select style="font-size:12px;padding:4px" onchange="ZIP_REVIEW['+i+'].jugId=parseInt(this.value)||\'\'"><option value="">Sin match</option>'+jugOpts.replace('value="'+r.jugId+'"','value="'+r.jugId+'" selected')+'</select></td>'+
      '<td><input style="width:90px;font-size:12px;padding:4px" value="'+r.fecha+'" onchange="ZIP_REVIEW['+i+'].fecha=this.value"/></td>'+
      '<td><input style="width:60px;font-size:12px;padding:4px" type="number" step="0.001" value="'+r.ma+'" onchange="ZIP_REVIEW['+i+'].ma=parseFloat(this.value)"/></td>'+
      '<td><input style="width:60px;font-size:12px;padding:4px" type="number" step="0.001" value="'+r.mm+'" onchange="ZIP_REVIEW['+i+'].mm=parseFloat(this.value)"/></td>'+
      '<td><input style="width:60px;font-size:12px;padding:4px" type="number" step="0.001" value="'+r.mo+'" onchange="ZIP_REVIEW['+i+'].mo=parseFloat(this.value)"/></td>'+
      '<td><input style="width:55px;font-size:12px;padding:4px" type="number" step="0.1" value="'+r.s6p+'" onchange="ZIP_REVIEW['+i+'].s6p=parseFloat(this.value)"/></td>'+
    '</tr>';
  }).join('');
  $('zipreview').innerHTML='<div style="overflow-x:auto"><table class="data-table" style="font-size:12px"><thead><tr><th></th><th>Archivo</th><th>Jugadora</th><th>Fecha</th><th>MA</th><th>MM</th><th>MO</th><th>S6P</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
async function insertarZipReview(){
  var contadores={};
  var okCount=0,errCount=0;
  for(var i=0;i<ZIP_REVIEW.length;i++){
    var r=ZIP_REVIEW[i];
    if(!r.incluir||!r.jugId)continue;
    if(contadores[r.jugId]==null)contadores[r.jugId]=medsJ(r.jugId).length;
    contadores[r.jugId]++;
    var imo=r.mo>0?Math.round(r.mm/r.mo*100)/100:0;
    var res=await sb.from('mediciones').insert({jugadora_id:r.jugId,fecha:r.fecha||'—',n_medicion:contadores[r.jugId],peso:r.peso||null,talla:r.talla||null,masa_adiposa:r.ma,masa_muscular:r.mm,masa_osea:r.mo,s6p:r.s6p,imo:imo});
    if(res.error)errCount++;else okCount++;
  }
  closeModal();await loadAdmin();renderAdmin();
  alert('Listo: '+okCount+' mediciones cargadas'+(errCount?', '+errCount+' con error':'')+'.');
}

bootstrap();
</script>
